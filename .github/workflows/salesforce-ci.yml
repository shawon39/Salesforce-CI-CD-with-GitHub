name: Salesforce CI/CD

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Latest checkout action

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli
          sf --version

      - name: Authenticate with Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > sfdx-auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx-auth.txt --alias ci-org --set-default
          rm sfdx-auth.txt  # Clean up after authentication

      - name: Validate Deployment
        run: sf project deploy validate --source-dir force-app --target-org ci-org

      - name: Run Apex Tests
        run: sf apex test run --target-org ci-org --result-format human --code-coverage --wait 10
