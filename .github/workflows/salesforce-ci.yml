name: Salesforce CI/CD

on:
  pull_request:
    branches: [develop]
  push:
    branches: [develop]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4  # Updated to latest version

      - name: Install Salesforce CLI
        uses: salesforce/cli  # Latest official CLI setup
        with:
          version: latest  # Ensures the latest version is used

      - name: Authenticate with Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > sfdx-auth.txt
          sfdx auth:sfdxurl:store --sfdxurlfile sfdx-auth.txt --setalias ci-org
          rm sfdx-auth.txt  # Clean up after authentication

      - name: Validate Deployment
        run: sfdx force:source:deploy -p force-app --checkonly -u ci-org

      - name: Run Apex Tests
        run: sfdx force:apex:test:run -u ci-org --resultformat human --codecoverage --wait 10
